spring:
  application:
    name: kwikquant
  profiles:
    default: dev
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DB:kwikquant}
    username: ${POSTGRES_USER:kwikquant}
    password: ${POSTGRES_PASSWORD:}
    hikari:
      pool-name: kwikquant-hikari
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 300000
      keepalive-time: 120000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  jackson:
    deserialization:
      use-big-decimal-for-floats: true
    default-property-inclusion: non_null

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    default-statement-timeout: 5

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

kwikquant:
  audit:
    async: true
    async-pool:
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 1000
      keep-alive: 60s
