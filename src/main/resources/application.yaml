spring:
  application:
    name: kwikquant
  profiles:
    default: dev
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DB:kwikquant}
    username: ${POSTGRES_USER:kwikquant}
    password: ${POSTGRES_PASSWORD:}
    hikari:
      pool-name: kwikquant-hikari
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 5000
      max-lifetime: 300000
      keepalive-time: 120000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  jackson:
    deserialization:
      use-big-decimal-for-floats: true
    default-property-inclusion: non_null
  ai:
    mcp:
      server:
        name: kwikquant
        version: "1.0"
        protocol: STREAMABLE

mybatis:
  type-handlers-package: com.kwikquant.market.infrastructure
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    default-statement-timeout: 5

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

kwikquant:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl: 15m
    refresh-token-ttl: 7d
  encryption:
    key: ${ENCRYPTION_KEY}
  audit:
    async: true
    async-pool:
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 1000
      keep-alive: 60s
  proxy:                                    # CCXT 代理配置(dev 本地翻墙,prod 走 overrides 直连)
    defaults:
      rest-proxy: http://127.0.0.1:13659
      ws-proxy: socks5://127.0.0.1:13659
  market:
    stale-threshold: 5s
    idle-timeout: 30s
    exchanges:
      - name: OKX
        market-types:
          - SPOT
          - PERP
        persistent-symbols:
          - BTC/USDT
          - ETH/USDT
          - SOL/USDT
          - ADA/USDT
          - XRP/USDT
          - DOGE/USDT
          - AVAX/USDT
          - LTC/USDT
      - name: BITGET
        market-types: [SPOT, PERP]
        persistent-symbols: [BTC/USDT, ETH/USDT]
      - name: BINANCE
        market-types:
          - SPOT
          - PERP
        persistent-symbols:
          - BTC/USDT
          - ETH/USDT
