# 本地开发 profile 配置。JWT / 加密 secret 必须走环境变量，避免源码泄露即被接管。
# 本地启动时通过 .env 或 export 提供：
#   JWT_SECRET             32 字节 base64（openssl rand -base64 32）
#   ENCRYPTION_KEY         32 字节 base64（openssl rand -base64 32）
#   KWIKQUANT_MCP_PEPPER   MCP PAT HMAC pepper（任意高熵字符串，建议 ≥ 32 字节）
# 若未设置 → 应用启动时 KeyManagementService / McpTokenHasher 会失败退出，符合 fail-fast。
kwikquant:
  jwt:
    secret: ${JWT_SECRET}
  encryption:
    key: ${ENCRYPTION_KEY}
  mcp:
    pepper: ${KWIKQUANT_MCP_PEPPER}
