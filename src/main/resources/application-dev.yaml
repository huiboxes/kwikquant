# 本地开发 profile 配置。JWT / 加密 secret 必须走环境变量，避免源码泄露即被接管。
# 本地启动时通过 .env 或 export 提供：
#   JWT_SECRET             32 字节 base64（openssl rand -base64 32）
#   ENCRYPTION_KEY         32 字节 base64（openssl rand -base64 32）
#   KWIKQUANT_MCP_PEPPER   MCP PAT HMAC pepper（任意高熵字符串，建议 ≥ 32 字节）
# 若未设置 → 应用启动时 KeyManagementService / McpTokenHasher 会失败退出，符合 fail-fast。
kwikquant:
  jwt:
    secret: ${JWT_SECRET}
  encryption:
    key: ${ENCRYPTION_KEY}
  mcp:
    pepper: ${KWIKQUANT_MCP_PEPPER}
  cookie:
    # dev 跑 HTTP,Secure cookie 浏览器不发 → 刷新页面 refresh 拿不到 cookie 退出登录;故 dev 关 Secure
    secure: false
  worker:
    # 回测 worker 调 Java REST 拉 K 线(Task 6 废 PG 直连);dev Java 在本机 8080
    api-base: http://localhost:8080
    # 回测 worker 直连 Postgres 只读 DSN(加载 K 线);dev 复用主 datasource 同库同账号
    pg-readonly-dsn: host=${POSTGRES_HOST:127.0.0.1} port=${POSTGRES_PORT:5432} dbname=${POSTGRES_DB:kwikquant} user=${POSTGRES_USER:kwikquant} password=${POSTGRES_PASSWORD:}
