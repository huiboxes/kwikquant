# =============================================================================
# KwikQuant CI — fast feedback for every push and pull request.
#
# Single JDK (21 LTS), single OS (ubuntu-latest), single job. The ubuntu-latest
# runner ships with a working Docker daemon, so the same `verify` run that does
# compile / unit tests / ArchUnit / jacoco also drives the Testcontainers
# integration tests against real Postgres.
#
# Note on PR safety: this workflow runs on `pull_request` (not
# `pull_request_target`) and intentionally requests no `secrets`. Test-time
# JWT/API-key material lives in application-test.yml as non-secret 32-byte
# placeholders, never real credentials. Before adding any token (Codecov,
# SonarCloud, Sonatype, ...) split secret-aware steps into a separate workflow
# gated by repo-owner approval — fork PRs can otherwise modify mvnw / build
# scripts to exfiltrate the secret.
# =============================================================================

name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read
    actions: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    MAVEN_CLI_OPTS: "-B -ntp -Dstyle.color=always"
    JAVA_VERSION: "21"

jobs:
    build:
        name: Backend Build & Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Set up JDK 21
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: ${{ env.JAVA_VERSION }}
                  cache: maven

            - name: Verify wrapper integrity
              run: |
                  test -x ./mvnw
                  ./mvnw --version

            - name: Verify Docker is available (Testcontainers prerequisite)
              run: docker info --format 'Docker {{.ServerVersion}} ({{.OperatingSystem}})'

            - name: Verify (compile + unit + integration + jacoco + archunit)
              timeout-minutes: 10
              run: ./mvnw $MAVEN_CLI_OPTS clean verify

            - name: Upload JaCoCo reports
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: jacoco-reports
                  path: "**/target/site/jacoco/"
                  if-no-files-found: ignore

            - name: Upload test reports on failure
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: test-reports
                  path: |
                      **/target/surefire-reports/
                      **/target/failsafe-reports/
                  if-no-files-found: ignore
