name: deploy
on:
  push: { branches: [main] }
  workflow_dispatch:
    inputs:
      commit:
        description: "commit sha (默认 HEAD)"
        required: false
concurrency: { group: deploy-prod, cancel-in-progress: false }
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set commit sha
        id: s
        run: echo "sha=${{ github.event.inputs.commit || github.sha }}" >> $GITHUB_OUTPUT
      - name: Build frontend dist
        working-directory: frontend
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build
          tar czf /tmp/frontend-dist.tgz -C dist .
      - name: Stage server-deploy.sh
        run: cp docker/server-deploy.sh /tmp/server-deploy.sh
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "/tmp/frontend-dist.tgz,/tmp/server-deploy.sh"
          target: ${{ secrets.DEPLOY_PATH || '/opt/kwikquant' }}
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            DEPLOY=${{ secrets.DEPLOY_PATH || '/opt/kwikquant' }}
            mkdir -p $DEPLOY /var/www/kwikquant
            cd $DEPLOY
            tar xzf frontend-dist.tgz -C /var/www/kwikquant
            sudo bash server-deploy.sh ${{ steps.s.outputs.sha }}
