name: deploy
on:
  push: { branches: [main] }
  workflow_dispatch:
    inputs:
      commit:
        description: "commit sha to deploy (默认 HEAD)"
        required: false
concurrency:
  group: deploy-prod
  cancel-in-progress: false
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - name: Set commit sha
        id: s
        run: echo "sha=${{ github.event.inputs.commit || github.sha }}" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kwikquant:${{ steps.s.outputs.sha }}
            ghcr.io/${{ github.repository_owner }}/kwikquant:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend dist
        working-directory: frontend
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build
          tar czf /tmp/frontend-dist.tgz -C dist .
      - name: Stage deploy files (flat, scp 不带目录前缀)
        run: |
          cp docker/server-deploy.sh /tmp/server-deploy.sh
          cp docker/docker-compose.prod.yml /tmp/docker-compose.prod.yml
      - name: Upload dist + deploy scripts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "/tmp/frontend-dist.tgz,/tmp/server-deploy.sh,/tmp/docker-compose.prod.yml"
          target: ${{ secrets.DEPLOY_PATH || '/opt/kwikquant' }}
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            DEPLOY=${{ secrets.DEPLOY_PATH || '/opt/kwikquant' }}
            mkdir -p $DEPLOY /var/www/kwikquant
            cd $DEPLOY
            tar xzf frontend-dist.tgz -C /var/www/kwikquant
            sudo bash server-deploy.sh ${{ steps.s.outputs.sha }}
