<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>KwikQuant — AI Native 量化交易</title>
<link href="https://g.alicdn.com/code/lib/daisyui/5.1.25/daisyui.css" rel="stylesheet" type="text/css"/>
<link href="https://g.alicdn.com/code/lib/daisyui/5.1.25/themes.css" rel="stylesheet" type="text/css"/>
<script src="https://g.alicdn.com/code/lib/react/17.0.2/umd/react.development.js"></script>
<script src="https://g.alicdn.com/code/lib/react-dom/17.0.2/umd/react-dom.development.js"></script>
<script src="https://g.alicdn.com/code/lib/react-router-dom/5.3.4/react-router-dom.js"></script>
<script src="https://g.alicdn.com/code/lib/tailwindcss-browser/4.1.13/index.global.js"></script>
<script src="https://g.alicdn.com/code/lib/babel-standalone/7.25.0/babel.min.js"></script>
<style>
:root[data-theme="light"]{
  --canvas:#FAF8F4; --surface:#FFFFFF; --surface-2:#F3F0E9; --surface-3:#E8E4DA;
  --ink:#1A1614; --ink-2:#5C544C; --ink-3:#8C8378; --hair:#E3DED2; --hair-2:#EFEAE0;
  --brand:#EB8131; --brand-2:#C5651F; --brand-soft:#FCE6D5; --brand-ink:#8C3D0E;
  --brand-glow:rgba(235,129,49,.35);
  --up:#1E8E7E; --down:#E60050; --warn:#B8740A; --info:#1E6FB8;
  --shadow-card:0 1px 2px rgba(20,17,15,.04),0 6px 24px -12px rgba(20,17,15,.08);
  --shadow-pop:0 12px 40px -16px rgba(20,17,15,.18);
}
:root[data-theme="dark"]{
  --canvas:#14110F; --surface:#1B1714; --surface-2:#241F1A; --surface-3:#2C2620;
  --ink:#F5F2EC; --ink-2:#B8AFA2; --ink-3:#7F766B; --hair:#2C2620; --hair-2:#241F1A;
  --brand:#EB8131; --brand-2:#C5651F; --brand-soft:#3A2415; --brand-ink:#F5B98A;
  --brand-glow:rgba(235,129,49,.45);
  --up:#2BA298; --down:#F63969; --warn:#E0A043; --info:#5BA8E8;
  --shadow-card:0 1px 2px rgba(0,0,0,.3),0 8px 24px -12px rgba(0,0,0,.5);
  --shadow-pop:0 16px 48px -16px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif}
body{font-feature-settings:"tnum" 0}
.font-display{font-family:"Cormorant Garamond","Iowan Old Style","Apple Garamond","Baskerville",Georgia,"Times New Roman",serif;font-feature-settings:"liga" 1,"calt" 1}
.font-mono-num{font-family:ui-monospace,"SF Mono","Menlo","JetBrains Mono","Cascadia Code","Roboto Mono",monospace;font-feature-settings:"tnum" 1,"zero" 1}
input,textarea,select,button{font:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--hair);border-radius:8px;border:2px solid var(--canvas)}
::-webkit-scrollbar-thumb:hover{background:var(--ink-3)}
.kq-sidebar-scroll{scrollbar-width:thin;scrollbar-color:transparent transparent;scrollbar-gutter:stable}
.kq-sidebar-scroll::-webkit-scrollbar{width:6px;height:6px}
.kq-sidebar-scroll::-webkit-scrollbar-track{background:transparent}
.kq-sidebar-scroll::-webkit-scrollbar-thumb{background:transparent;border-radius:6px;border:0 solid transparent;transition:background .2s}
.kq-sidebar-scroll:hover::-webkit-scrollbar-thumb{background:var(--hair)}
.kq-sidebar-scroll::-webkit-scrollbar-thumb:hover{background:var(--ink-3)}
.kq-card{background:var(--surface);border:1px solid transparent;border-radius:16px;box-shadow:var(--shadow-card)}
.kq-chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.02em;background:var(--surface-2);color:var(--ink-2);border:1px solid transparent}
.kq-btn-primary{background:var(--brand);color:#fff;border-radius:10px;font-weight:600;padding:9px 16px;border:none;cursor:pointer;transition:all .15s}
.kq-btn-primary:hover{background:var(--brand-2);transform:translateY(-1px);box-shadow:0 4px 12px -2px var(--brand-glow,rgba(230,0,35,.4))}
.kq-btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--hair);border-radius:10px;font-weight:500;padding:9px 16px;cursor:pointer;transition:all .15s}
.kq-btn-ghost:hover{background:var(--surface-2);border-color:var(--ink-3);color:var(--ink)}
.kq-icon-btn{background:transparent;border:none;border-radius:10px;cursor:pointer;color:var(--ink-2);transition:background .12s,color .12s}
.kq-icon-btn:hover{background:var(--surface-2);color:var(--ink)}
.kq-press:active{transform:translateY(1px)}
.kq-nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--ink-2);font-size:14px;font-weight:500;cursor:pointer;transition:all .12s;border:1px solid transparent;position:relative;overflow:hidden}
.kq-nav-item:hover{background:var(--surface-2);color:var(--ink)}
.kq-nav-item.active{background:linear-gradient(90deg,var(--brand-soft) 0%,transparent 70%);color:var(--brand)}
.kq-nav-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:2px;border-radius:0 2px 2px 0;background:var(--brand);box-shadow:0 0 8px var(--brand-glow),0 0 2px var(--brand)}
.kq-divider{height:1px;background:var(--hair);border:0;margin:0}
.kq-flash{animation:kqFlash .8s ease-out}
@keyframes kqFlash{0%{background:var(--brand-soft)}100%{background:transparent}}
.kq-tick-up{color:var(--up)}
.kq-tick-down{color:var(--down)}
.kq-grid-bg{background-image:linear-gradient(var(--hair) 1px,transparent 1px),linear-gradient(90deg,var(--hair) 1px,transparent 1px);background-size:32px 32px;opacity:.5}
.kq-stream-cursor::after{content:"▍";animation:kqBlink 1s steps(2) infinite;color:var(--brand);margin-left:1px}
@keyframes kqBlink{50%{opacity:0}}
.kq-pin{break-inside:avoid;margin-bottom:16px;border-radius:14px;overflow:hidden;border:1px solid transparent;background:var(--surface);box-shadow:var(--shadow-card);transition:transform .2s,box-shadow .2s}
.kq-pin:hover{transform:translateY(-3px);box-shadow:var(--shadow-pop)}
.kq-pin-img{width:100%;display:block}
.kq-pin-body{padding:12px 14px}
.kq-status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;position:relative}
.kq-status-dot-live::before,.kq-status-dot-live::after{content:'';position:absolute;inset:0;border-radius:50%;pointer-events:none;animation:kqRing 2.2s ease-out infinite}
.kq-status-dot-live::after{animation-delay:1.1s}
@keyframes kqRing{0%{box-shadow:0 0 0 0 currentColor;opacity:0.75}70%{opacity:0}100%{box-shadow:0 0 0 9px currentColor;opacity:0}}
.kq-tab{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;color:var(--ink-2);cursor:pointer;border:1px solid transparent;background:transparent;transition:all .12s}
.kq-tab:hover{background:var(--surface-2);color:var(--ink)}
.kq-tab.active{background:var(--surface-2);color:var(--ink);border-color:var(--hair);box-shadow:var(--shadow-card)}
.kq-input{background:var(--surface-2);border:1px solid transparent;border-radius:10px;padding:9px 12px;color:var(--ink);font-size:14px;width:100%;outline:none;transition:border .15s,background .15s}
.kq-input:focus{border-color:var(--brand);background:var(--surface)}
.kq-label{font-size:11px;font-weight:600;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:block}
.kq-modal-backdrop{position:fixed;inset:0;background:rgba(10,8,7,.6);backdrop-filter:blur(2px);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
.kq-drawer{position:fixed;top:0;right:0;height:100vh;width:380px;max-width:90vw;background:var(--surface);border-left:1px solid transparent;box-shadow:var(--shadow-pop);z-index:60;transform:translateX(100%);transition:transform .25s ease}
.kq-drawer.open{transform:translateX(0)}
.kq-toast{position:fixed;bottom:24px;right:24px;z-index:80;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.kq-toast-item{background:var(--surface);border:1px solid transparent;border-left:3px solid var(--brand);border-radius:10px;padding:12px 16px;box-shadow:var(--shadow-pop);min-width:280px;animation:kqSlideIn .25s ease}
@keyframes kqSlideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.kq-code-block{background:var(--surface-2);border:1px solid transparent;border-radius:10px;font-family:ui-monospace,"SF Mono","JetBrains Mono",monospace;font-size:12.5px;line-height:1.6;padding:14px;overflow:auto;color:var(--ink);white-space:pre}
.kq-mono-row{font-family:ui-monospace,"SF Mono","JetBrains Mono",monospace;font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums}
.kq-live-badge{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.08em;background:var(--brand);color:#fff}
.kq-paper-badge{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.08em;background:var(--surface-3);color:var(--ink-2);border:1px solid var(--hair)}
.kq-pulse{animation:kqPulse 2s ease-in-out infinite}
@keyframes kqPulse{0%,100%{opacity:1}50%{opacity:.5}}
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:8px}
button:focus:not(:focus-visible),a:focus:not(:focus-visible){outline:none}
.kq-page-enter{animation:kqPageEnter .3s cubic-bezier(.2,.7,.3,1)}
@keyframes kqPageEnter{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.kq-modal-backdrop{animation:kqFade .2s ease-out}
@keyframes kqFade{from{opacity:0}to{opacity:1}}
.kq-modal-panel{animation:kqPop .24s cubic-bezier(.2,.7,.3,1)}
@keyframes kqPop{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.kq-drawer.open{animation:kqDrawerIn .28s cubic-bezier(.2,.7,.3,1)}
@keyframes kqDrawerIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
:root[data-theme="dark"] .kq-nav-item{color:#FFFFFF}
:root[data-theme="dark"] .kq-nav-item:hover{color:#FFFFFF}
:root[data-theme="dark"] .kq-nav-item.active{color:var(--brand)}
</style>
<style type="text/tailwindcss">
@theme{
  --color-brand:var(--brand);
  --color-canvas:var(--canvas);
  --color-surface:var(--surface);
  --color-ink:var(--ink);
  --color-up:var(--up);
  --color-down:var(--down);
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components/AppContext.jsx"></script>
<script type="text/babel" src="components/ui.jsx"></script>
<script type="text/babel" src="components/LoginPage.jsx"></script>
<script type="text/babel" src="components/DashboardPage.jsx"></script>
<script type="text/babel" src="components/StrategyPage.jsx"></script>
<script type="text/babel" src="components/BacktestPage.jsx"></script>
<script type="text/babel" src="components/TradingPage.jsx"></script>
<script type="text/babel" src="components/RiskPage.jsx"></script>
<script type="text/babel" src="components/PortfolioPage.jsx"></script>
<script type="text/babel" src="components/MarketPage.jsx"></script>
<script type="text/babel" src="components/HistoryPage.jsx"></script>
<script type="text/babel" src="components/SettingsPage.jsx"></script>
<script type="text/babel" src="components/AppLayout.jsx"></script>
<script type="text/babel" src="components/App.jsx"></script>
<script>
if(!window.__SHAPE__){window.__SHAPE__={}}
window.__SHAPE__.bootTheme=function(){
  try{var t=localStorage.getItem('kq-theme');if(t){document.documentElement.setAttribute('data-theme',t);}}catch(e){}
};
window.__SHAPE__.bootTheme();
window.__SHAPE__.setTheme=function(t){
  document.documentElement.setAttribute('data-theme',t);
  try{localStorage.setItem('kq-theme',t);}catch(e){}
  window.dispatchEvent(new Event('kq-theme-change'));
};
</script>
</body>
</html>
