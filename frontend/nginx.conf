# KwikQuant 前端 nginx 站点
# 放 /etc/nginx/sites-available/kwikquant.conf 或 containers/nginx/conf.d/
# 改 server_name 为你的域名,certbot --nginx 自动补 TLS
server {
    listen 80;
    server_name kwikquant.example.com;   # 改域名,或 _ 默认所有

    root /usr/share/nginx/html;          # 镜像内;服务器裸 nginx 用 /var/www/kwikquant
    index index.html;

    # SPA fallback(Vite history 路由)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API → 后端容器
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket → 后端(/ws + STOMP)
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;   # 长连接
    }

    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
