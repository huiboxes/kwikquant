# =============================================================================
# KwikQuant local infrastructure for development.
#
#   PostgreSQL 16 — data persistence for the monolith.
#
# Prerequisites:
#   Create a .env file in the project root with the required passwords.
#   See .env.example for the template.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml down -v   # destroy volumes
# =============================================================================

services:
    postgres:
        image: postgres:16-alpine
        container_name: kwikquant-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: kwikquant
            POSTGRES_USER: kwikquant
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        command: >
            postgres
            -c shared_buffers=256MB
            -c effective_cache_size=1GB
            -c work_mem=4MB
            -c maintenance_work_mem=64MB
            -c max_connections=50
            -c wal_buffers=16MB
            -c checkpoint_completion_target=0.9
            -c random_page_cost=1.1
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U kwikquant -d kwikquant"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    postgres_data:
        name: kwikquant_postgres_data